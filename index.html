<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Delicacies Kitchen</title>
    <link rel="icon"
    type="image/x-icon"
    href="./ChefHatIcon.jpg">

</head>

<style>
    body
    {   
     background-color: rgb(29, 29, 29);
     margin: 0%;
    }

    .buttons        
    {
     background-color: #ffb4c8;
     display: flex;
     justify-content: center;
     gap: 50px;
     box-shadow: 0 0 50px;
    }

    .button
    {
     background-color: #ffb4c8;
     color: rgb(0, 0, 0);
     font-size: 10px;
     padding: 5px;
     border: none;
     cursor: pointer;
     font-family: times new roman;
     transition-duration: 0.5s;
    }

    .button:hover
    {
     background-color: #000000;
     color: white;
     text-shadow: #ffb4c8 0 0 10px;
     border-radius: 10px;
    }

    header
    {
     text-align: center;
     background-color: rgb(0, 0, 0);
     padding: 5px;
     color: #ffb4c8;
    }

    .menus
    {
     display: flex;
     justify-content: center;
     gap: 50px;
     margin-top: 30px;
    }

    .menu
    {
     color: #000000;
     width: 150px;
     height: 200px;
     font-size: 25px;
     transition-duration: 0.5s;
     transform: scale(0.95s);
     font-family: italic;
     border-radius: 30px;
    }

    .menu:hover
    {
     color: white;
     text-shadow: #000000 0 0 10px,
                  #000000 0 0 10px,
                  #000000 0 0 10px,
                  #000000 0 0 10px,
                  #000000 0 0 10px;
     cursor: pointer;
     box-shadow: #ffb4c8 0 0 50px;
    }

    .appetizers
    {
     background-image: url(./cheesy\ pot.jpg);
     background-size: cover;
    }

    .dishes
    {
     background-image: url(./SklletLsgna.jpg);
     background-size: cover;
    }

    .desserts
    {
     background-image: url(./donut.jpg);
     background-size: cover;
    }

    .drinks
    {
     background-image: url(./smres\ drnk.jpg);
     background-size: cover;
    }

</style>

<body>

    <header>
     <h1>Delicacies Recipes</h1>
     <p>Learn Different Cuisines!</p>
    </header>

    <div class="buttons">
        <a href="./index.html">
            <button class="button">Home</button>
        </a>
        <a href="./regitrtionfrm.html">
            <button class="button">Sign Up</button>
        </a>
        <a href="./LogInFrms.html">
            <button class="button">Log In</button>
        </a>
    </div>

    <div class="menus">
    <a href="./appetizer.html">
     <button class="menu appetizers">Appetizers</button>
    </a>

    <a href="./dishs.html">
     <button class="menu dishes">Dishes</button>
    </a>

    <a href="./desserts.html">
     <button class="menu desserts">Desserts</button>
    </a>

    <a href="./drnks.html">
     <button class="menu drinks">Drinks</button>
    </a>
    </div>
    

</body>
</html>
